    <!-- Completely eliminate flash of wrong theme -->
    <script>
        (function() {
            const THEME_KEY = "REDEFINE-THEME-STATUS";
            const DARK = "dark", LIGHT = "light";
            
            // Get preferred theme
            function getTheme() {
                try {
                    const saved = localStorage.getItem(THEME_KEY);
                    if (saved) {
                        const { isDark } = JSON.parse(saved);
                        return isDark ? DARK : LIGHT;
                    }
                } catch (e) {}
                
                return matchMedia("(prefers-color-scheme: dark)").matches ? DARK : LIGHT;
            }
            
            // Apply theme to document
            function applyTheme(theme) {
                const isDark = theme === DARK;
                const root = document.documentElement;
                
                // Set classes for compatibility
                root.classList.add(theme);
                root.classList.remove(isDark ? LIGHT : DARK);
                root.style.colorScheme = theme;
            }
            
            // Initial application
            const theme = getTheme();
            applyTheme(theme);
            
            // Listen for system preference changes
            matchMedia("(prefers-color-scheme: dark)").addEventListener("change", ({ matches }) => {
                // Only update if using system preference (no localStorage entry)
                if (!localStorage.getItem(THEME_KEY)) {
                    applyTheme(matches ? DARK : LIGHT);
                }
            });
            
            // Set body classes ASAP (before DOMContentLoaded)
            (function() {
                const addBodyClass = () => {
                    const b = document.body;
                    if (!b) return false;
                    b.classList.add(theme + "-mode");
                    return true;
                };

                // Try immediately
                if (addBodyClass()) return;

                // Observe until body exists
                const mo = new MutationObserver(() => {
                    if (addBodyClass()) mo.disconnect();
                });
                mo.observe(document.documentElement, { childList: true, subtree: true });
            })();
        })();
    </script>

                        <script>
(function() {
  function addHotPosts() {
    var sidebar = document.querySelector('.sticky-container');
    if (!sidebar || document.querySelector('.sidebar-hot-posts')) return;
    var links = [];
    var h3links = document.querySelectorAll('h3 a');
    for (var i = 0; i < h3links.length; i++) {
      var a = h3links[i];
      if (a.getAttribute('href') && a.getAttribute('href') !== '/' && !a.getAttribute('href').startsWith('#')) {
        links.push({href: a.getAttribute('href'), text: (a.textContent || a.getAttribute('title') || '').trim()});
      }
    }
    if (links.length < 2) return;
    var html = '<div class="sidebar-hot-posts"><div class="title">&#x1F525; 热门文章</div>';
    for (var i = 0; i < Math.min(5, links.length); i++) {
      html += '<div class="item"><a href="' + links[i].href + '">' + links[i].text + '</a></div>';
    }
    html += '</div>';
    sidebar.insertAdjacentHTML('beforeend', html);
  }
  if (document.readyState === 'complete') setTimeout(addHotPosts, 800);
  else window.addEventListener('load', function(){setTimeout(addHotPosts, 800)});
})();
</script>
